name: Weekly RAGAS Regression

on:
  schedule:
    # Every Monday at 03:00 UTC (14:00 AEST)
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      dataset:
        description: "Eval dataset path"
        required: false
        default: "eval/golden-set.jsonl"
      notify_on_pass:
        description: "Create issue even on pass (for tracking)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

env:
  AWS_REGION: ap-southeast-2

jobs:
  weekly-regression:
    name: Weekly RAGAS Regression
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: |
          pip install -r requirements-ragas.txt
          uv sync --project apps/rag-service

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine eval dataset
        id: dataset
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "path=${{ github.event.inputs.dataset }}" >> "$GITHUB_OUTPUT"
          else
            echo "path=eval/golden-set.jsonl" >> "$GITHUB_OUTPUT"
          fi

      - name: Run eval:agent (generate RAGAS input)
        run: |
          pnpm eval:agent -- \
            --agent supervisor \
            --input "${{ steps.dataset.outputs.path }}" \
            --output tmp/evals/supervisor-ragas.jsonl \
            --output-format ragas
        env:
          BEDROCK_SUPERVISOR_ALIAS_ARN: ${{ secrets.BEDROCK_SUPERVISOR_ALIAS_ARN }}

      - name: Run eval:ragas (compute metrics)
        run: |
          pnpm eval:ragas -- \
            --input tmp/evals/supervisor-ragas.jsonl \
            --output tmp/evals/supervisor-ragas-results.json
        env:
          RAGAS_EVAL_LLM_MODEL: "amazon.nova-pro-v1:0"
          RAGAS_EVAL_EMBEDDING_MODEL: "amazon.titan-embed-text-v2:0"
          RAGAS_EVAL_TIMEOUT: "300"

      - name: Run eval:work-search (rule-based)
        run: |
          pnpm eval:agent -- \
            --agent supervisor \
            --input "${{ steps.dataset.outputs.path }}" \
            --output tmp/evals/supervisor-native.jsonl
          pnpm eval:work-search -- \
            --input tmp/evals/supervisor-native.jsonl \
            --output tmp/evals/work-search-rules.json
        continue-on-error: true
        env:
          BEDROCK_SUPERVISOR_ALIAS_ARN: ${{ secrets.BEDROCK_SUPERVISOR_ALIAS_ARN }}

      - name: Run quality gate
        id: gate
        run: |
          GATE_ARGS="--results tmp/evals/supervisor-ragas-results.json --thresholds eval/thresholds.json"
          if [ -f eval/baselines/metrics-v1.json ]; then
            GATE_ARGS="$GATE_ARGS --baseline eval/baselines/metrics-v1.json"
          fi
          GATE_ARGS="$GATE_ARGS --json-output tmp/evals/gate-report.json"
          python3 scripts/ragas_ci_gate.py $GATE_ARGS
        continue-on-error: true

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-regression-${{ github.run_number }}
          path: |
            tmp/evals/supervisor-ragas.jsonl
            tmp/evals/supervisor-ragas-results.json
            tmp/evals/gate-report.json
            tmp/evals/work-search-rules.json
          retention-days: 90

      - name: Create issue on failure or tracking
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let gatePassed = true;
            let body = '';

            try {
              const gate = JSON.parse(fs.readFileSync('tmp/evals/gate-report.json', 'utf8'));
              gatePassed = gate.passed;

              const icon = gate.passed ? 'PASSED' : 'FAILED';
              body += `## Weekly RAGAS Regression: ${icon}\n\n`;
              body += `**Date**: ${new Date().toISOString().split('T')[0]}\n`;
              body += `**Checks**: ${gate.checks_passed}/${gate.checks_total} passed\n`;
              body += `**Run**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n`;

              body += '### Results\n';
              body += '| Group | Metric | Value | Passed |\n';
              body += '|-------|--------|-------|--------|\n';
              for (const [group, metrics] of Object.entries(gate.groups)) {
                for (const [metric, info] of Object.entries(metrics)) {
                  const mIcon = info.passed ? 'yes' : 'NO';
                  body += `| ${group} | ${metric} | ${info.value?.toFixed(4) ?? 'NaN'} | ${mIcon} |\n`;
                }
              }

              if (gate.failures && gate.failures.length > 0) {
                body += '\n### Failures\n';
                for (const f of gate.failures) {
                  body += `- **${f.group}/${f.metric}**: ${f.value?.toFixed(4) ?? 'NaN'} (threshold: ${f.threshold ?? '-'}, reason: ${f.reason})\n`;
                }
              }

              if (gate.improvements && gate.improvements.length > 0) {
                body += '\n### Improvements\n';
                for (const imp of gate.improvements) {
                  body += `- **${imp.group}/${imp.metric}**: ${imp.value?.toFixed(4)} (baseline: ${imp.baseline_mean})\n`;
                }
              }
            } catch (e) {
              gatePassed = false;
              body = `## Weekly RAGAS Regression: ERROR\n\nCould not parse gate report: ${e.message}\n`;
              body += `\n**Run**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n`;
            }

            const shouldNotify = '${{ github.event.inputs.notify_on_pass }}' === 'true';
            if (!gatePassed || shouldNotify) {
              const labels = gatePassed ? ['eval', 'tracking'] : ['eval', 'regression'];
              const title = gatePassed
                ? `Weekly RAGAS Regression: PASSED (${new Date().toISOString().split('T')[0]})`
                : `Weekly RAGAS Regression: FAILED (${new Date().toISOString().split('T')[0]})`;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              });
            }
