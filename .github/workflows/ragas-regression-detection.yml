name: RAGAS Regression Detection

on:
  push:
    branches: [main, master]
    paths:
      - "apps/rag-service/**"
      - "scripts/ragas_baseline.py"
      - "scripts/benchmark_features.sh"
      - "benchmarks/ragas-baselines/**"
  pull_request:
    branches: [main, master]

env:
  AWS_REGION: ap-southeast-2
  RAGAS_TIMEOUT: 300

jobs:
  ragas-validation:
    name: RAGAS Infrastructure Validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ragas boto3 litellm langchain-aws langchain-community datasets

      - name: Validate baseline files
        run: |
          BASELINE_COUNT=$(find benchmarks/ragas-baselines -name "baseline-*.json" 2>/dev/null | wc -l)
          echo "Found $BASELINE_COUNT baseline files"
          if [ "$BASELINE_COUNT" -lt 6 ]; then
            echo "WARNING: Expected 6 baseline configurations, found $BASELINE_COUNT"
          else
            echo "OK: All 6 baseline configurations present"
          fi

      - name: Lint scripts
        run: |
          pip install ruff
          ruff check scripts/ragas_baseline.py --select=E,F,W || true

      - name: Check secrets
        run: |
          if grep -r "AKIA\|arn:aws" scripts/ragas_baseline.py scripts/benchmark_features.sh 2>/dev/null | grep -v "^#"; then
            echo "ERROR: Found potential hardcoded credentials"
            exit 1
          else
            echo "OK: No hardcoded credentials detected"
          fi

      - name: Report
        run: echo "RAGAS infrastructure validation passed"
