name: RAG Evaluation

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/rag-service/**"
      - "scripts/ragas_eval.py"
      - "scripts/ragas_ci_gate.py"
      - "eval/**"
  push:
    branches: [main]
    paths:
      - "apps/rag-service/**"
      - "scripts/ragas_eval.py"
      - "scripts/ragas_ci_gate.py"
      - "eval/**"
  workflow_dispatch:
    inputs:
      dataset:
        description: "Eval dataset path (default: eval/golden-set.jsonl)"
        required: false
        default: "eval/golden-set.jsonl"
      strict:
        description: "Fail on NaN metrics"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-southeast-2

jobs:
  rag-eval:
    name: RAGAS Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: |
          pip install -r requirements-ragas.txt
          uv sync --project apps/rag-service

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine eval dataset
        id: dataset
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "path=${{ github.event.inputs.dataset }}" >> "$GITHUB_OUTPUT"
          else
            echo "path=eval/golden-set.jsonl" >> "$GITHUB_OUTPUT"
          fi

      - name: Run eval:agent (generate RAGAS input)
        run: |
          pnpm eval:agent -- \
            --agent supervisor \
            --input "${{ steps.dataset.outputs.path }}" \
            --output tmp/evals/supervisor-ragas.jsonl \
            --output-format ragas
        env:
          BEDROCK_SUPERVISOR_ALIAS_ARN: ${{ secrets.BEDROCK_SUPERVISOR_ALIAS_ARN }}

      - name: Run eval:ragas (compute metrics)
        run: |
          pnpm eval:ragas -- \
            --input tmp/evals/supervisor-ragas.jsonl \
            --output tmp/evals/supervisor-ragas-results.json
        env:
          RAGAS_EVAL_LLM_MODEL: "amazon.nova-lite-v1:0"
          RAGAS_EVAL_EMBEDDING_MODEL: "amazon.titan-embed-text-v2:0"

      - name: Run quality gate
        id: gate
        run: |
          GATE_ARGS="--results tmp/evals/supervisor-ragas-results.json --thresholds eval/thresholds.json"
          if [ -f eval/baselines/metrics-v1.json ]; then
            GATE_ARGS="$GATE_ARGS --baseline eval/baselines/metrics-v1.json"
          fi
          if [ "${{ github.event.inputs.strict }}" = "true" ]; then
            GATE_ARGS="$GATE_ARGS --strict"
          fi
          GATE_ARGS="$GATE_ARGS --json-output tmp/evals/gate-report.json"
          python3 scripts/ragas_ci_gate.py $GATE_ARGS

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-eval-results
          path: |
            tmp/evals/supervisor-ragas.jsonl
            tmp/evals/supervisor-ragas-results.json
            tmp/evals/gate-report.json
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔍 RAGAS Evaluation Results\n\n';

            try {
              const gate = JSON.parse(fs.readFileSync('tmp/evals/gate-report.json', 'utf8'));
              const icon = gate.passed ? '✅' : '❌';
              body += `**Status**: ${icon} ${gate.passed ? 'PASSED' : 'FAILED'}\n`;
              body += `**Checks**: ${gate.checks_passed}/${gate.checks_total} passed\n\n`;

              if (gate.failures && gate.failures.length > 0) {
                body += '### Failures\n';
                body += '| Group | Metric | Value | Threshold | Reason |\n';
                body += '|-------|--------|-------|-----------|--------|\n';
                for (const f of gate.failures) {
                  body += `| ${f.group} | ${f.metric} | ${f.value?.toFixed(4) ?? 'NaN'} | ${f.threshold ?? '-'} | ${f.reason} |\n`;
                }
                body += '\n';
              }

              if (gate.improvements && gate.improvements.length > 0) {
                body += '### 🎉 Improvements\n';
                for (const imp of gate.improvements) {
                  body += `- **${imp.group}/${imp.metric}**: ${imp.value?.toFixed(4)} (baseline: ${imp.baseline_mean})\n`;
                }
                body += '\n';
              }

              body += '### Per-Group Summary\n';
              body += '| Group | Metric | Value | Passed |\n';
              body += '|-------|--------|-------|--------|\n';
              for (const [group, metrics] of Object.entries(gate.groups)) {
                for (const [metric, info] of Object.entries(metrics)) {
                  const mIcon = info.passed ? '✅' : '❌';
                  body += `| ${group} | ${metric} | ${info.value?.toFixed(4) ?? 'NaN'} | ${mIcon} |\n`;
                }
              }
            } catch (e) {
              body += `⚠️ Could not parse gate report: ${e.message}\n`;
            }

            body += '\n<details><summary>📎 Full results available in workflow artifacts</summary>\n\n';
            body += `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n`;
            body += '</details>';

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body.includes('RAGAS Evaluation Results'));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
